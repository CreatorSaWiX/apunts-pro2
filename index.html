<body>
  <div id="root">
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      #initial-loader h1 {
        color: white;
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
      }

      #initial-loader .accent {
        color: #38bdf8;
      }

      .spinner-wrapper {
        position: relative;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-bg {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.4);
        opacity: 0.15;
      }

      .spinner {
        position: absolute;
        inset: 0;
        animation: spin 0.8s linear infinite;
        filter: drop-shadow(0 0 6px rgba(14, 165, 233, 0.5));
      }

      .spinner-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 0%, transparent 10%, #ffffff 30%, #0ea5e9 100%);
        -webkit-mask-image: radial-gradient(closest-side, transparent calc(100% - 4px - 0.5px), black calc(100% - 4px + 0.5px));
        mask-image: radial-gradient(closest-side, transparent calc(100% - 4px - 0.5px), black calc(100% - 4px + 0.5px));
      }

      .spinner-dot {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 4px;
        height: 4px;
        background-color: #0ea5e9;
        border-radius: 50%;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <div id="initial-loader">
      <h1>Apunts</h1>
      <div class="spinner-wrapper">
        <div class="spinner-bg"></div>
        <div class="spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-dot"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
